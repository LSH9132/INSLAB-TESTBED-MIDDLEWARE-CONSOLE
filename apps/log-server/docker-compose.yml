services:
  log-db:
    image: postgres:15-alpine
    container_name: inslab-log-db
    environment:
      POSTGRES_USER: inslab
      POSTGRES_PASSWORD: inslab_password
      POSTGRES_DB: inslab_logs
    ports:
      - '5432:5432'
    volumes:
      - log-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  log-redis:
    image: redis:7-alpine
    container_name: inslab-log-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - '6379:6379'
    volumes:
      - log-redis-data:/data
    restart: unless-stopped

  log-server:
    build:
      context: ../../
      dockerfile: apps/log-server/Dockerfile
    environment:
      HTTP_PORT: 3002
      TCP_PORT: 5140
      DATABASE_URL: postgresql://inslab:inslab_password@log-db:5432/inslab_logs
      REDIS_URL: redis://log-redis:6379
    ports:
      - '3002:3002'
      - '5140:5140'
    depends_on:
      - log-db
      - log-redis
    restart: unless-stopped

volumes:
  log-db-data:
  log-redis-data:
