services:
  log-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: inslab
      POSTGRES_PASSWORD: inslab_password
      POSTGRES_DB: inslab_logs
    volumes:
      - log-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  log-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - log-redis-data:/data
    restart: unless-stopped

  central-server:
    build:
      context: .
      dockerfile: apps/central-server/Dockerfile
    ports:
      - "3101:3001"
    volumes:
      - central-data:/app/data
      - ~/.ssh/id_rsa:/root/.ssh/id_rsa:ro
    environment:
      - LOG_SERVER_URL=http://log-server:3002
      - SSH_PRIVATE_KEY_PATH=/root/.ssh/id_rsa
    depends_on:
      - log-server
    restart: unless-stopped

  web-console:
    build:
      context: .
      dockerfile: apps/web-console/Dockerfile
      args:
        - NEXT_PUBLIC_CENTRAL_SERVER_URL=http://localhost:3101
    ports:
      - "3100:3000"
    environment:
      - CENTRAL_SERVER_URL=http://central-server:3001
    depends_on:
      - central-server
    restart: unless-stopped

  log-server:
    build:
      context: .
      dockerfile: apps/log-server/Dockerfile
    environment:
      - HTTP_PORT=3002
      - TCP_PORT=5140
      - DATABASE_URL=postgresql://inslab:inslab_password@log-db:5432/inslab_logs
      - REDIS_URL=redis://log-redis:6379
    ports:
      - "6140:5140"
      - "3102:3002"
    depends_on:
      - log-db
      - log-redis
    restart: unless-stopped

volumes:
  central-data:
  log-db-data:
  log-redis-data:
