services:
  central-server:
    build:
      context: .
      dockerfile: apps/central-server/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - central-data:/app/data
      - ~/.ssh/id_rsa:/root/.ssh/id_rsa:ro
    environment:
      - LOG_SERVER_URL=http://log-server:3002
      - SSH_PRIVATE_KEY_PATH=/root/.ssh/id_rsa
    depends_on:
      - log-server
    restart: unless-stopped

  web-console:
    build:
      context: .
      dockerfile: apps/web-console/Dockerfile
      args:
        - NEXT_PUBLIC_CENTRAL_SERVER_URL=http://localhost:3001
    ports:
      - "3000:3000"
    environment:
      - CENTRAL_SERVER_URL=http://central-server:3001
    depends_on:
      - central-server
    restart: unless-stopped

  log-server:
    build:
      context: .
      dockerfile: apps/log-server/Dockerfile
    ports:
      - "5140:5140"
      - "3002:3002"
    volumes:
      - log-data:/app/data
    restart: unless-stopped

volumes:
  central-data:
  log-data:
